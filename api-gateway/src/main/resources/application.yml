server:
  port: 4004

spring:
  cloud:
    gateway:
      server:
        webflux:          # ? new namespace
          routes:
            - id: patient-service-route
              uri: http://patient-service:4000
              predicates:
                - Path=/api/patients, /api/patients/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: auth-service-route
              uri: http://auth-service:4005
              predicates:
                - Path=/auth/**
              filters:
                  - StripPrefix=1